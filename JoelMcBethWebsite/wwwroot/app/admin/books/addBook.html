<h2>Add Book</h2>
<form name="$ctrl.form" novalidate>
    <div class="alert alert-danger" role="alert" ng-show="$ctrl.error">
        {{$ctrl.error}}
    </div>

    <div class="form-group">
        <label>Title</label> <span class="badge badge-light">Required</span>
        <input class="form-control col-lg-3 col-md-4" ng-model="$ctrl.book.title" required type="text" />
        <div class="invalid-feedback col-lg-3">Enter a valid title.</div>
    </div>

    <div class="form-group">
        <label>ISBN 13</label> <span class="badge badge-light">Required</span>
        <input class="form-control" ng-model="$ctrl.book.isbn13" required type="text" ng-minlength="13" ng-maxlength="13" />
    </div>

    <div class="form-group">
        <label>Rating</label>
        <input class="form-control" ng-model="$ctrl.book.rating" type="number" required />
    </div>

    <div class="form-group">
        <label>Number of Pages</label>
        <input class="form-control" ng-model="$ctrl.book.pages" type="number" />
    </div>

    <div>
        <div class="row">
            <label class="col">Authors</label>
        </div>
        
        <div class="row">
            <div class="col form-group">
                <input class="btn" type="button" value="Add Author" ng-click="$ctrl.createAuthor()" />
            </div>
        </div>

        <div class="form-row" ng-if="$ctrl.book.authors.length > 0">
                <label class="col-3">First Name</label>
                <label class="col-3">Last Name</label>
                <label class="col-3">Middle Name</label>
        </div>

        <div ng-repeat="author in $ctrl.book.authors">
            <div class="form-row">
                <input type="hidden" ng-model="author.id" />
                <div class="form-group col-3">
                    <input class="form-control col" ng-model="author.firstName" required />
                </div>
                <div class="form-group col-3">
                    <input class="form-control col" ng-model="author.lastName" required />
                </div>
                <div class="form-group col-3">
                    <input class="form-control col" ng-model="author.middleName" />
                </div>
                <div class="form-group col">
                    <input class="btn btn-danger" type="button" value="Remove" ng-click="$ctrl.removeAuthor(author)" />
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Review</label>
            <div class="form-group" ng-if="!$ctrl.book.reviews[0]">
                <input class="btn" type="button" value="Add Review" ng-click="$ctrl.createReview()" />
            </div>
            <div ng-if="$ctrl.book.reviews[0]">
                <div class="form-group">
                    <label>Rating</label>
                    <select class="form-control col-2" ng-model="$ctrl.book.reviews[0].rating">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                    </select>
                </div>
                
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="recommended" ng-model="$ctrl.book.reviews[0].isRecommended">
                    <label class="form-check-label" for="recommended">
                        Recommended
                    </label>
                </div>       
            </div>
        </div>

    </div>

    <button type="submit" class="btn btn-primary" ng-click="$ctrl.addBook($ctrl.book)" ng-disabled="!$ctrl.canAddBook()">Add Book</button>
</form>
